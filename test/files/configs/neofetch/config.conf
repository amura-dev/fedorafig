# Neofetch Configuration File
# This file contains obscure and fun settings to make your terminal more unique.

# Show distro name
info "Distro" yes
# Show kernel version
info "Kernel" yes
# Show uptime info
info "Uptime" yes
# Show CPU info
info "CPU" yes
# Show RAM info
info "Memory" yes
# Show GPU info (when available)
info "GPU" yes
# Show disk usage (with fancy formatting)
info "Disk" yes

# Turn off information like:
info "Packages" no
info "Shell" no
info "Resolution" no
info "Desktop Environment" no
info "WM" no
info "CPU Load" no
info "Battery" no
info "Local IP" no
info "Public IP" no

# Show info in a colorful, obscure style
color "CPU" "yellow"
color "Memory" "magenta"
color "Disk" "cyan"
color "Kernel" "red"
color "Uptime" "blue"
color "GPU" "green"
color "Distro" "purple"

# ASCII Art: Pick a super obscure distro or OS for your ASCII art.
# Change the ASCII Art to some obscure one (e.g., BSD, Hurd, or even something custom)
ascii_distro="openbsd"

# Use the 'random' option to choose a random ASCII every time
# ascii_distro="random"

# Set a custom banner (e.g., quirky message or ASCII logo)
custom_banner="Memento Mori! \nThe terminal is the canvas, let us paint!"
banner_color="yellow"

# Set the spacing of the ASCII art to look funky (weird, more spaced-out)
ascii_spacing=1

# Set a cool theme (you can try "powerline", "lean", "bash", "fish", etc. for cool terminal output)
theme="lean"

# Uncomment if you want to make it even more "cryptic" with some obscure terminal art.
ascii_colors=( "bold red" "bold green" "bold yellow" "bold blue" "bold magenta" "bold cyan" )

# Adjust the "fancy" display (show or hide certain items, tweak font appearance)
info_font="big" # You can also try "small", "univers", "block", etc.
info_font_color="green"

# Show a more advanced system detail like a list of active users
users=("user1" "user2" "user3")  # add any usernames that are active in your system

# Display extra system details if you have Docker or LXD containers running
info "Containers" yes

# Display only one line of the banner at first and then auto-expand
split_banner=true

# Show system temperature if you have sensors available
info "Temperature" yes

# Enable fancy emojis for added flair
emoji="true" # This will enable an emoji for each section like CPU, RAM, etc.
emoji_style="fluffy"  # Can be "fluffy", "minimal", "cloud", "modern"

# Enable system uptime info in a special format (weird formats!)
uptime_format="%h:%m:%s"

# Use an advanced custom uptime/CPU display that adjusts over time (persistence)
use_persistent_cpu="yes"

# System Time Format (Add weird date and time formats)
time_format="🕒 %I:%M:%S %p %A, %B %d, %Y"
time_style="bold blue"

# Alter the layout of your Neofetch (spread out info into blocks or columns)
layout="block"  # You can change this to "column", "row", "table"

# Hide or display different parts of the system info dynamically
dynamic_info="yes"
dynamic_toggle="cpu ram disk"

# Use a randomized background color (for terminal customization fun)
background_color="random"  # This can be any color name or "random"

# Use bold text or underline for certain text (makes things look cool)
bold_text="true"
underline="true"

# Add an optional "fun mode" feature where you get funny system messages
fun_mode="true" # Display system-specific jokes or messages (requires internet)
fun_theme="hacker"  # Can be "hacker", "sci-fi", "meme", etc.

# Display "suspicious" messages for extra flair (really obscure)
suspicious_messages=("The terminal is a secret place, don't tell anyone..." "You know too much..." "Shh, the kernel is listening...")
random_message=true

# Display a cat meme after each info block for fun
cat_meme="true"
cat_style="cute" # You can also try "grumpy", "snarky"

# Show current system version with some obscure file or data info
info "System Version" yes
# Custom command to fetch obscure version info or experimental feature
custom_version_info="yes"
custom_version_command="cat /etc/os-release | grep VERSION"

# Add a custom footer with a funky quote or saying
footer="Let's rock this terminal... \n- The system whisperer"
footer_style="bold red"
footer_position="bottom"

# Display all file system details (ext4, Btrfs, etc.)
info "Filesystem" yes

# Show only the system architecture with a special format (e.g., 64-bit, ARM, etc.)
architecture_format="System Arch: %b"

# Option to display graphical card details in a funky way
info "GPU Details" yes
gpu_detail_style="bold cyan"

# Custom paths for logging system events in Neofetch
log_path="/var/log/neofetch.log"
log_level="verbose"

# Display system statistics in a retro format
retro_mode="true"
retro_theme="green_on_black"
